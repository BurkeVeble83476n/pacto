name: Build and publish release binaries

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goos: [linux, darwin, windows]
        goarch: [amd64, arm64]

    steps:
      - uses: actions/checkout@v6.0.2

      - uses: actions/setup-go@v6.3.0
        with:
          go-version: '1.25'

      - name: Build binary
        run: |
          mkdir -p dist
          output=pacto_${{ matrix.goos }}_${{ matrix.goarch }}
          if [ "${{ matrix.goos }}" = "windows" ]; then output=$output.exe; fi
          tag="${{ github.event.release.tag_name }}"
          commit="${{ github.sha }}"
          date="$(date -u '+%Y-%m-%dT%H:%M:%SZ')"
          GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} \
            go build -ldflags "-s -w -X main.version=$tag -X main.gitCommit=$commit -X main.buildDate=$date" \
            -o dist/$output ./cmd/pacto

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: pacto_${{ matrix.goos }}_${{ matrix.goarch }}
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.event.release.tag_name, 'v')

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd dist
          sha256sum * > checksums.txt

      - name: Publish to GitHub Release
        uses: softprops/action-gh-release@v2.5.0
        with:
          files: dist/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
