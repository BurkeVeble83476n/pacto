  <svg id="theme-icon-dark" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none;"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
  <svg id="theme-icon-light" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none;"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>

<script>
(function() {
  var toggle = document.getElementById("theme-toggle");
  var iconDark = document.getElementById("theme-icon-dark");
  var iconLight = document.getElementById("theme-icon-light");
  var stored = localStorage.getItem("jtd-theme");
  var current;

  function systemTheme() {
    if (window.matchMedia && window.matchMedia("(prefers-color-scheme: light)").matches) {
      return "light";
    }
    return "dark";
  }

  current = stored || systemTheme();

  function applyTheme(theme) {
    jtd.setTheme(theme);
    document.documentElement.setAttribute("data-theme", theme);
    current = theme;
    iconDark.style.display = theme === "dark" ? "none" : "inline";
    iconLight.style.display = theme === "dark" ? "inline" : "none";
  }

  applyTheme(current);

  toggle.addEventListener("click", function() {
    current = current === "dark" ? "light" : "dark";
    localStorage.setItem("jtd-theme", current);
    applyTheme(current);
  });

  if (window.matchMedia) {
    window.matchMedia("(prefers-color-scheme: dark)").addEventListener("change", function(e) {
      if (!localStorage.getItem("jtd-theme")) {
        applyTheme(e.matches ? "dark" : "light");
      }
    });
  }
})();
</script>
