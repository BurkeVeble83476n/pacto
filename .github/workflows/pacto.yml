name: Pacto Contract CI

on:
  push:
    branches: [main]
    paths:
      - 'pactos/**'
      - 'pkg/dashboard/**'
  pull_request:
    paths:
      - 'pactos/**'
      - 'pkg/dashboard/**'
  release:
    types: [published]
  workflow_run:
    workflows: ['Auto release']
    types: [completed]

permissions:
  contents: read
  packages: write
  pull-requests: write

jobs:
  bundle:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2

      - uses: actions/setup-go@v6.4.0
        with:
          go-version: '1.25'

      # Build pacto from source so that bundle generation and validation
      # always use the contract model from this branch. On releases, fall
      # back to the published binary via pacto-actions.
      - name: Build pacto from source
        if: github.event_name != 'release'
        run: go install ./cmd/pacto

      - name: Install official plugins
        if: github.event_name != 'release'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG=$(gh release view --repo TrianaLab/pacto-plugins --json tagName -q .tagName)
          GOBIN=$(go env GOPATH)/bin
          for plugin in pacto-plugin-schema-infer pacto-plugin-openapi-infer; do
            gh release download "$TAG" --repo TrianaLab/pacto-plugins \
              --pattern "${plugin}_linux_amd64" --output "${GOBIN}/${plugin}"
            chmod +x "${GOBIN}/${plugin}"
          done

      - uses: trianalab/pacto-actions@v1
        if: github.event_name == 'release'
        with:
          command: setup

      # Install syft and generate SBOM
      - name: Install syft
        uses: anchore/sbom-action/download-syft@v0.20.0

      - name: Generate bundle
        run: make gen-bundle

      # Validate the generated contract
      - name: Validate contract
        run: pacto validate ./pactos/pacto-dashboard --set service.version=0.1.0

      # Upload bundle as artifact for later use
      - name: Upload bundle artifact
        uses: actions/upload-artifact@v7
        with:
          name: pacto-dashboard-bundle
          path: pactos/pacto-dashboard/

      # On PRs: diff against the published contract
      # On PRs: diff against the published contract
      - name: Contract diff
        if: github.event_name == 'pull_request'
        continue-on-error: true
        run: |
          pacto diff \
            oci://ghcr.io/trianalab/pactos/pacto-dashboard \
            ./pactos/pacto-dashboard \
            --new-set service.version=0.0.0-pr.${{ github.event.pull_request.number }} \
            -o markdown || true

      # On PRs: generate docs
      - name: Contract doc
        if: github.event_name == 'pull_request'
        run: |
          pacto doc ./pactos/pacto-dashboard \
            --set service.version=0.0.0-pr.${{ github.event.pull_request.number }}

  publish:
    if: >-
      github.event_name == 'release' ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')
    needs: bundle
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2

      - uses: trianalab/pacto-actions@v1
        with:
          command: setup

      # Resolve the release tag: use the release event tag if available,
      # otherwise fetch the latest release tag (workflow_run trigger).
      - name: Resolve release tag
        id: tag
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            echo "tag=${{ github.event.release.tag_name }}" >> "$GITHUB_OUTPUT"
          else
            TAG=$(gh release view --json tagName -q .tagName)
            echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          fi

      - name: Download bundle artifact
        uses: actions/download-artifact@v4.3.0
        with:
          name: pacto-dashboard-bundle
          path: pactos/pacto-dashboard/

      - uses: trianalab/pacto-actions@v1
        with:
          command: push
          ref: oci://ghcr.io/trianalab/pactos/pacto-dashboard:${{ steps.tag.outputs.tag }}
          path: ./pactos/pacto-dashboard
          set: |
            service.version=${{ steps.tag.outputs.tag }}
