name: CI

on:
  push:
    branches:
      - main
  schedule:
    - cron: '0 0 * * *'

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6.0.2

      - uses: ./.github/actions/ci

  coverage:
    needs: ci
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6.0.2

      - uses: actions/setup-go@v6.3.0
        with:
          go-version: '1.25'

      - uses: actions/cache@v5.0.3
        with:
          path: |
            ~/.cache/go-build
            ${{ env.GOPATH }}/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Download dependencies
        run: go mod download

      - name: Run tests with coverage
        run: go test $(go list ./... | grep -v /tests/ | grep -v /testutil | grep -v /cmd/gendocs) -coverprofile=coverage.txt

      - name: Enforce 100% test coverage
        run: |
          total=$(go tool cover -func=coverage.txt | grep '^total:' | awk '{print $NF}')
          if [ "$total" != "100.0%" ]; then
            echo "FAIL: total coverage is $total, expected 100.0%"
            go tool cover -func=coverage.txt | grep -v '100.0%'
            exit 1
          fi
          echo "total coverage: 100.0%"

      - name: Upload results to Codecov
        uses: codecov/codecov-action@v5.5.2
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
