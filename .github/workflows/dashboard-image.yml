name: Build and publish dashboard image

on:
  release:
    types: [published]

permissions:
  contents: read
  packages: write

jobs:
  docker:
    if: startsWith(github.event.release.tag_name, 'v')
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6.0.2

      - name: Extract version
        id: version
        run: |
          tag="${{ github.event.release.tag_name }}"
          # Strip 'v' prefix for image tag
          echo "version=${tag#v}" >> "$GITHUB_OUTPUT"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-qemu-action@v4.0.0
      - uses: docker/setup-buildx-action@v4.0.0

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4.0.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v7.0.0
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ghcr.io/trianalab/pacto-dashboard:${{ steps.version.outputs.version }}
          build-args: |
            VERSION=${{ steps.version.outputs.tag }}
            GIT_COMMIT=${{ github.sha }}
            BUILD_DATE=${{ github.event.release.created_at }}
          labels: |
            org.opencontainers.image.title=pacto-dashboard
            org.opencontainers.image.description=Pacto service contract dashboard
            org.opencontainers.image.version=${{ steps.version.outputs.version }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
