name: Auto release

on:
  pull_request:
    types: [closed]
    branches:
      - main

permissions:
  contents: write
  packages: write
  id-token: write

jobs:
  release:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.version.outputs.tag }}
      skip: ${{ steps.bump.outputs.type == 'skip' }}
    steps:
      - name: Determine version bump
        id: bump
        run: |
          title="${{ github.event.pull_request.title }}"

          # Check for breaking change indicator
          if [[ "$title" =~ ^[a-z]+(\(.+\))?\!: ]]; then
            echo "type=major" >> "$GITHUB_OUTPUT"
          elif [[ "$title" =~ ^feat(\(.+\))?: ]]; then
            echo "type=minor" >> "$GITHUB_OUTPUT"
          elif [[ "$title" =~ ^(fix|perf|refactor)(\(.+\))?\!?: ]]; then
            echo "type=patch" >> "$GITHUB_OUTPUT"
          else
            echo "Skipping release for: $title"
            echo "type=skip" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v6.0.2
        if: steps.bump.outputs.type != 'skip'
        with:
          fetch-depth: 0

      - name: Calculate next version
        if: steps.bump.outputs.type != 'skip'
        id: version
        run: |
          # Get the latest semver tag
          latest=$(git tag --list 'v*' --sort=-v:refname | head -n1)
          if [ -z "$latest" ]; then
            latest="v0.0.0"
          fi

          # Strip the 'v' prefix and split
          version="${latest#v}"
          IFS='.' read -r major minor patch <<< "$version"

          case "${{ steps.bump.outputs.type }}" in
            major)
              major=$((major + 1))
              minor=0
              patch=0
              ;;
            minor)
              minor=$((minor + 1))
              patch=0
              ;;
            patch)
              patch=$((patch + 1))
              ;;
          esac

          next="v${major}.${minor}.${patch}"
          echo "tag=$next" >> "$GITHUB_OUTPUT"
          echo "Bumping ${{ steps.bump.outputs.type }}: $latest -> $next"

      - name: Create GitHub release
        if: steps.bump.outputs.type != 'skip'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ steps.version.outputs.tag }}" \
            --title "${{ steps.version.outputs.tag }}" \
            --generate-notes \
            --target main

  build:
    needs: release
    if: needs.release.outputs.skip != 'true'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goos: [linux, darwin, windows]
        goarch: [amd64, arm64]

    steps:
      - uses: actions/checkout@v6.0.2

      - uses: actions/setup-go@v6.4.0
        with:
          go-version: '1.25'

      - name: Build binary
        run: |
          mkdir -p dist
          tag="${{ needs.release.outputs.tag }}"
          commit="${{ github.sha }}"
          date="$(date -u '+%Y-%m-%dT%H:%M:%SZ')"
          output=pacto_${{ matrix.goos }}_${{ matrix.goarch }}
          if [ "${{ matrix.goos }}" = "windows" ]; then output=$output.exe; fi
          GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} \
            go build -ldflags "-s -w -X main.version=$tag -X main.gitCommit=$commit -X main.buildDate=$date" \
            -o dist/$output ./cmd/pacto

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: pacto_${{ matrix.goos }}_${{ matrix.goarch }}
          path: dist/

  publish:
    needs: [release, build]
    if: needs.release.outputs.skip != 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd dist
          sha256sum * > checksums.txt

      - name: Publish to GitHub Release
        uses: softprops/action-gh-release@v2.5.0
        with:
          tag_name: ${{ needs.release.outputs.tag }}
          files: dist/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  docker-build:
    needs: release
    if: needs.release.outputs.skip != 'true'
    strategy:
      matrix:
        include:
          - runner: ubuntu-latest
            platform: linux/amd64
          - runner: ubuntu-24.04-arm
            platform: linux/arm64
    runs-on: ${{ matrix.runner }}

    steps:
      - uses: actions/checkout@v6.0.2

      - name: Extract version
        id: meta
        run: |
          tag="${{ needs.release.outputs.tag }}"
          echo "version=${tag#v}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v4.0.0

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push platform image
        id: build
        uses: docker/build-push-action@v7.0.0
        with:
          context: .
          push: true
          platforms: ${{ matrix.platform }}
          tags: ghcr.io/trianalab/pacto-dashboard:${{ steps.meta.outputs.version }}
          cache-from: type=gha,scope=${{ matrix.platform }}
          cache-to: type=gha,mode=max,scope=${{ matrix.platform }}
          build-args: |
            VERSION=${{ needs.release.outputs.tag }}
            GIT_COMMIT=${{ github.sha }}
            BUILD_DATE=${{ github.event.pull_request.merged_at }}
          labels: |
            org.opencontainers.image.title=pacto-dashboard
            org.opencontainers.image.description=Pacto service contract dashboard
            org.opencontainers.image.version=${{ steps.meta.outputs.version }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}

      - name: Export digest
        run: |
          digest="${{ steps.build.outputs.digest }}"
          echo "digest=${digest}" >> "$GITHUB_OUTPUT"
          mkdir -p /tmp/digests
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v7
        with:
          name: digest-${{ matrix.runner }}
          path: /tmp/digests/*
          retention-days: 1

  docker-merge:
    needs: [release, docker-build]
    if: needs.release.outputs.skip != 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Extract version
        id: meta
        run: |
          tag="${{ needs.release.outputs.tag }}"
          echo "version=${tag#v}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v4.0.0

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          pattern: digest-*
          path: /tmp/digests
          merge-multiple: true

      - name: Create multi-arch manifest
        run: |
          image="ghcr.io/trianalab/pacto-dashboard:${{ steps.meta.outputs.version }}"
          digests=$(printf "${image}@sha256:%s " $(ls /tmp/digests/))
          docker buildx imagetools create -t "${image}" ${digests}

      - name: Inspect manifest
        run: |
          docker buildx imagetools inspect \
            "ghcr.io/trianalab/pacto-dashboard:${{ steps.meta.outputs.version }}"

      - name: Install Cosign
        uses: sigstore/cosign-installer@v4.1.0

      - name: Sign dashboard image
        run: |
          digest=$(docker buildx imagetools inspect \
            "ghcr.io/trianalab/pacto-dashboard:${{ steps.meta.outputs.version }}" \
            --format '{{json .Manifest.Digest}}' | tr -d '"')
          cosign sign --yes \
            "ghcr.io/trianalab/pacto-dashboard:${{ steps.meta.outputs.version }}@${digest}"
