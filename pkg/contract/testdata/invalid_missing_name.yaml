pactoVersion: "1.0"

service:
  version: 1.0.0

interfaces:
  - name: api
    type: http
    port: 8080

runtime:
  workload:
    type: service
    concurrency: finite

  state:
    type: stateless
    persistence:
      scope: local
      durability: ephemeral
    dataCriticality: low

  health:
    interface: api
    path: /health
